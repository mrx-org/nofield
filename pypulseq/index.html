<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPulseq web</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.0/full/pyodide.js"></script>
    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <style>
        :root {
            --bg: #0b1020;
            --panel: #111a33;
            --text: #e8ecff;
            --muted: #a9b3da;
            --border: rgba(255, 255, 255, 0.12);
            --accent: #3b82f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        }
        body {
            padding: 0.5rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--panel);
            border-radius: 10px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .header {
            background: var(--panel);
            color: var(--text);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.25rem;
            color: var(--accent);
        }
        .header p {
            color: var(--muted);
            font-size: 0.875rem;
        }
        .versions {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid var(--border);
            font-size: 0.7rem;
            color: var(--muted);
        }
        .versions span {
            margin-right: 0.75rem;
        }
        .content {
            padding: 1rem;
        }
        .status-box {
            padding: 0.75rem;
            background: rgba(59, 130, 246, 0.1);
            border-left: 4px solid var(--accent);
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 1rem;
        }
        @media (max-width: 1024px) {
            .grid { grid-template-columns: 1fr; }
        }
        .full-width {
            grid-column: 1 / -1;
        }
        .panel {
            background: var(--panel);
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .panel h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 14px;
        }
        .controls {
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        .controls-table {
            width: 100%;
            border-collapse: collapse;
        }
        .controls-table td {
            padding: 0.1rem 0.25rem;
            vertical-align: middle;
        }
        .controls-table td:first-child {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: 100px;
        }
        .controls-table td:nth-child(2) {
            width: auto;
            min-width: 100px;
        }
        .controls-table td:last-child {
            width: 60px;
            text-align: right;
        }
        .type-tag {
            font-size: 0.7rem;
            background: rgba(255, 255, 255, 0.08);
            color: var(--muted);
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
            white-space: nowrap;
            border: 1px solid var(--border);
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            min-width: 100px;
            padding: 0.15rem 0.3rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }
        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        .toggle {
            position: relative;
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }
        .toggle input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            width: 2.25rem;
            height: 1.25rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 9999px;
            position: relative;
            transition: background 0.2s;
        }
        .toggle input:checked + .toggle-slider {
            background: var(--accent);
        }
        .toggle-slider::after {
            content: '';
            position: absolute;
            width: 1rem;
            height: 1rem;
            background: white;
            border-radius: 50%;
            top: 0.125rem;
            left: 0.125rem;
            transition: transform 0.2s;
        }
        .toggle input:checked + .toggle-slider::after {
            transform: translateX(1rem);
        }
        .button {
            width: 100%;
            max-width: 200px;
            background: var(--accent);
            color: white;
            font-weight: bold;
            padding: 0.5rem 1rem;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.875rem;
        }
        .button:hover:not(:disabled) {
            background: #2563eb;
        }
        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .button-hint {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 0.4rem;
            text-align: center;
        }
        .console {
            padding: 0.75rem;
            background: #111827;
            color: #4ade80;
            font-family: monospace;
            font-size: 0.7rem;
            border-radius: 0.375rem;
            overflow-x: auto;
            white-space: pre-wrap;
            height: 10rem;
            overflow-y: auto;
            border: 1px solid #1f2937;
        }
        .console .timestamp { color: var(--muted); }
        .console .error { color: #f87171; }
        .console .warn { color: #fbbf24; }
        .console .info { color: #4ade80; }
        #plot-output {
            width: 100%;
            margin-top: 1rem;
        }
        .mpl-figure-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-height: 100px;
            border: 1px dashed var(--border);
            border-radius: 10px;
            padding: 0.25rem;
            background: rgba(255, 255, 255, 0.04);
        }
        /* Style the figure containers generated by matplotlib */
        .mpl-figure-container > div {
            border: 1px solid var(--border) !important;
            border-radius: 10px !important;
            padding: 0 !important;
            background: var(--panel) !important;
            box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.3) !important;
            position: relative !important;
            display: block !important;
            width: 100% !important;
            max-width: 1000px !important;
            margin: 0 0 0.5rem 0 !important;
            overflow: hidden;
        }
        #plot-output canvas {
            display: block;
            max-width: 100%;
            height: auto !important;
            border-radius: 0;
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 14px;
        }
        .section-title svg {
            width: 1.1rem;
            height: 1.1rem;
            margin-right: 0.4rem;
        }
        .divider {
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 2s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #plot-output * {
            visibility: visible !important;
            pointer-events: auto !important;
        }
        /* Hide the figure titles and title bars */
        #plot-output .ui-dialog-titlebar {
            display: none !important;
        }
        /* Scale down the entire toolbar area and its contents by ~20% */
        #plot-output .mpl-toolbar, 
        #plot-output div[id$="top"] {
            display: flex !important;
            flex-wrap: wrap;
            gap: 3px;
            margin-bottom: 0;
            background: rgba(255, 255, 255, 0.06);
            padding: 3px;
            border-bottom: 1px solid var(--border);
            border-radius: 0;
            min-height: 24px;
        }
        #plot-output .mpl-toolbar button,
        #plot-output div[id$="top"] button,
        #plot-output .mpl-widget {
            padding: 2px 6px;
            background: var(--accent);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            line-height: 1.2;
            color: var(--text);
            transition: all 0.2s ease;
            opacity: 1;
        }
        #plot-output .mpl-toolbar button:hover,
        #plot-output div[id$="top"] button:hover,
        #plot-output .mpl-widget:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--accent);
            color: white;
        }
        #plot-output .mpl-toolbar button:active,
        #plot-output div[id$="top"] button:active,
        #plot-output .mpl-widget:active,
        #plot-output .mpl-toolbar button.mpl-active,
        #plot-output div[id$="top"] button.mpl-active,
        #plot-output .mpl-widget.mpl-active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        /* Style select dropdowns if they appear in the toolbar */
        #plot-output .mpl-toolbar select,
        #plot-output div[id$="top"] select {
            font-size: 10px !important;
            padding: 0 3px !important;
            height: 20px !important;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border: 1px solid var(--border);
        }
        /* Handle any images/icons in the toolbar */
        #plot-output .mpl-toolbar img,
        #plot-output div[id$="top"] img {
            width: 15px !important;
            height: 15px !important;
        }
        /* Tighten up the coordinate display area */
        #plot-output div[id$="message"] {
            font-size: 10px !important;
            padding: 2px 6px !important;
            min-height: 1rem !important;
            background: rgba(255, 255, 255, 0.04);
            border-top: 1px solid var(--border);
            color: var(--text);
        }
        #plot-output div[id$="top"] button:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        /* Code Editor Modal */
        .editor-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .editor-modal.active {
            display: flex;
        }
        .editor-container {
            background: var(--panel);
            border-radius: 10px;
            width: 90%;
            max-width: 1000px;
            height: 85%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
        }
        .editor-header {
            padding: 1rem;
            background: var(--panel);
            color: var(--text);
            border-radius: 10px 10px 0 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .editor-header h3 {
            margin: 0;
            font-size: 1.1rem;
        }
        .editor-actions {
            display: flex;
            gap: 0.5rem;
        }
        .editor-btn {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .editor-btn-primary {
            background: var(--accent);
            color: white;
            border: 1px solid rgba(0, 0, 0, 0.15);
        }
        .editor-btn-primary:hover {
            background: #2563eb;
        }
        .editor-btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .editor-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .editor-body {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .CodeMirror {
            height: 100%;
            font-size: 14px;
        }
        .edit-code-btn {
            width: 100%;
            max-width: 200px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            margin-top: 0.5rem;
        }
        .edit-code-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PyPulseq web</h1>
        </div>

        
        <div class="content">
            <div id="status-container" class="status-box">
                <div style="display: flex; align-items: center;">
                    <div id="loader" class="loader" style="margin-right: 0.5rem;"></div>
                    <span id="status" style="color: var(--text); font-weight: 500; font-size: 0.875rem;">Initializing Pyodide...</span>
                </div>
                <div id="version-info" style="font-size: 0.7rem; color: var(--muted);">Pyodide loading...</div>
            </div>

            <div class="grid">
                <div class="panel">
                    <h2 class="section-title">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Sequence Selector
                    </h2>
                    <div style="margin-bottom: 1rem;">
                        <select id="sequence-selector" style="width: 100%; padding: 0.5rem; background: rgba(255, 255, 255, 0.08); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.875rem; cursor: pointer;">
                            <option value="built_in_seq/mr0_rare_2d_seq.py">RARE 2D (built_in_seq/mr0_rare_2d_seq.py)</option>
                            <option value="write_gre.py">GRE (pypulseq example)</option>
                            <option value="write_epi.py">EPI (pypulseq example)</option>
                            <option value="write_epi_se.py">EPI SE (pypulseq example)</option>
                            <option value="write_epi_se_rs.py">EPI SE RS (pypulseq example)</option>
                            <option value="write_gre_label.py">GRE Label (pypulseq example)</option>
                            <option value="write_haste.py">HASTE (pypulseq example)</option>
                            <option value="write_tse.py">TSE (pypulseq example)</option>
                            <option value="write_ute.py">UTE (pypulseq example)</option>
                            <option value="mrseq_t1_inv_rec_gre_single_line">T1 Inversion Recovery GRE (mrseq)</option>
                            <option value="mrseq_github_radial_flash">Radial FLASH (mrseq GitHub)</option>
                        </select>
                    </div>
                    <h2 class="section-title" style="margin-top: 1.5rem;">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                        Parameters
                    </h2>
                    <div id="controls" class="controls">
                        <!-- Dynamic controls will be inserted here -->
                    </div>
                    <div class="divider">
                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem;">
                            <label style="display: flex; align-items: center; cursor: pointer; font-size: 0.875rem; color: var(--text);">
                                <input type="checkbox" id="dark-plot-checkbox" checked style="margin-right: 0.5rem; cursor: pointer; width: 1rem; height: 1rem;">
                                <span>Dark seq plot</span>
                            </label>
                            <select id="plot-speed-selector" style="padding: 0.25rem; background: rgba(255, 255, 255, 0.08); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.75rem; cursor: pointer;">
                                <option value="full">Full plot</option>
                                <option value="fast">Fast plot</option>
                                <option value="faster" selected>Faster plot</option>
                            </select>
                        </div>
                        <button id="run-btn" class="button" disabled>Generate Sequence</button>

                        <button id="edit-code-btn" class="edit-code-btn" style="display: none;">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 1rem; height: 1rem; display: inline-block; vertical-align: middle; margin-right: 0.25rem;">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                            </svg>
                            Edit Code
                        </button>
                    </div>
                </div>
                
                <div>
                    <h2 class="section-title">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        Sequence Plot
                    </h2>
                    <div id="plot-output"></div>
                </div>

                <div class="full-width" style="margin-top: 0.5rem;">
                    <h2 class="section-title">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        Console Output
                    </h2>
                    <div id="console-output" class="console"></div>
                    <div id="plot-message" style="display: none;"></div>
                    <div id="package-versions" class="versions">
                        <span><strong>Pyodide:</strong> <span id="pyodide-version">loading...</span></span>
                        <span><strong>NumPy:</strong> <span id="numpy-version">loading...</span></span>
                        <span><strong>Matplotlib:</strong> <span id="matplotlib-version">loading...</span></span>
                        <span><strong>PyPulseq:</strong> <span id="pypulseq-version">loading...</span></span>
                        <span><strong>mrseq:</strong> <span id="mrseq-version">loading...</span></span>
                        <span><strong>ISMRMRD:</strong> <span id="ismrmrd-version">loading...</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Code Editor Modal -->
    <div id="editor-modal" class="editor-modal">
        <div class="editor-container">
            <div class="editor-header">
                <h3>Edit Python Code (built_in_seq/mr0_rare_2d_seq.py)</h3>
                <div class="editor-actions">
                    <button id="load-default-btn" class="editor-btn editor-btn-secondary">Load Default</button>
                    <button id="save-code-btn" class="editor-btn editor-btn-primary">Save and Close</button>
                    <button id="close-editor-btn" class="editor-btn editor-btn-secondary">Discard and Close</button>
                </div>
            </div>
            <div class="editor-body">
                <textarea id="code-editor"></textarea>
            </div>
        </div>
    </div>

    <script type="module">
        let pyodide;
        let seq_RARE_2D_params = [];
        let currentCode = ''; // Store the current Python code
        let defaultCode = ''; // Store the default/original Python code
        let codeEditor = null; // CodeMirror editor instance
        let currentSequenceType = 'built_in_seq/mr0_rare_2d_seq.py'; // Current selected sequence
        let currentSequenceFunc = null; // For pypulseq example sequences

        const statusEl = document.getElementById('status');
        const loaderEl = document.getElementById('loader');
        const statusContainer = document.getElementById('status-container');
        const controlsEl = document.getElementById('controls');
        const runBtn = document.getElementById('run-btn');
        const consoleEl = document.getElementById('console-output');
        const plotOutput = document.getElementById('plot-output');
        const plotMessage = document.getElementById('plot-message');
        const darkPlotCheckbox = document.getElementById('dark-plot-checkbox');
        const sequenceSelector = document.getElementById('sequence-selector');
        const editCodeBtn = document.getElementById('edit-code-btn');
        const editorModal = document.getElementById('editor-modal');
        const saveCodeBtn = document.getElementById('save-code-btn');
        const closeEditorBtn = document.getElementById('close-editor-btn');
        const loadDefaultBtn = document.getElementById('load-default-btn');
        const codeEditorTextarea = document.getElementById('code-editor');

        // Mutation Observer to catch "ufo" divs (matplotlib figures) appended to body
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                mutation.addedNodes.forEach((node) => {
                    if (node.nodeType === 1) { // Element
                        const container = document.getElementById('mpl-actual-target');
                        if (!container) return;

                        // Check if this node or any of its children is a matplotlib canvas
                        const isMpl = node.querySelector('canvas') || node.classList.contains('ui-dialog') || (node.id && node.id.startsWith('matplotlib_'));
                        
                        if (isMpl && !container.contains(node)) {
                            console.log('Observer: Caught a "ufo" matplotlib element, moving to target area.');
                            container.appendChild(node);
                            
                            // Hide the "No plots generated" message
                            const loadingMsg = container.querySelector('p');
                            if (loadingMsg) loadingMsg.remove();
                        }
                    }
                });
            });
        });
        observer.observe(document.body, { childList: true, subtree: false });

        function log(msg, type = 'info') {
            const timestamp = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const colorClass = type === 'error' ? 'error' : (type === 'warn' ? 'warn' : 'info');
            consoleEl.innerHTML += `<div style="margin-bottom: 0.25rem;"><span class="timestamp">[${timestamp}]</span> <span class="${colorClass}">${msg}</span></div>`;

                    else if (param.type === 'list' || param.type === 'ndarray') val = `np.array(${input.value})`;

                                    val = inputValue;

import matplotlib.pyplot as plt
import __main__

    plt.rcParams['figure.figsize'] = [8, 3.5]

        'show_plots': False,
        'timing_check': False,
        'test_report': False
    }
    # Add dynamic arguments
    ${pyArgs.length > 0 ? pyArgs.map(arg => {
        const parts = arg.split('=');
        const key = parts[0].trim();
        const val = parts.slice(1).join('=').trim();
        return `kwargs['${key}'] = ${val}`;
    }).join('\n    ') : ''}
    
    seq = __main__.create_seq(**kwargs)
    print("PYTHON: Sequence created successfully", flush=True)
    
    # Store in __main__ for persistence
    __main__.seq = seq
    
    # Check timing

    try:

        print("PYTHON: Timing check passed", flush=True)
    except Exception as te:
        print(f"PYTHON: Timing check warning: {te}", flush=True)

    print("PYTHON: SUCCESS", flush=True)
    _final_res = "SUCCESS"
except Exception as e:
    print(f"PYTHON ERROR: {str(e)}", file=sys.stderr, flush=True)
    traceback.print_exc()
    _final_res = f"ERROR: {str(e)}"
    raise
_final_res

                } else {

                    pythonCode = `

            }
        });

        editorModal.addEventListener('click', (e) => {
            if (e.target === editorModal) {
                editorModal.classList.remove('active');

        });

        sequenceSelector.addEventListener('change', async (e) => {
            await loadSequence(e.target.value);
