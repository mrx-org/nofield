<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No-field Scanner</title>
    
    <!-- Dependencies for Niivue App -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.0/full/pyodide.js"></script>
    
    <!-- CSS Loading Order: Base styles first, then modules, then master override -->
    <link rel="stylesheet" href="startup.css">
    <link rel="stylesheet" href="niivue_app.css">
    <link rel="stylesheet" href="pypulseq/seq_explorer.css">
    <link rel="stylesheet" href="scan_zero/scan_module.css">
    <link rel="stylesheet" href="no_field.css"> <!-- Master override LAST -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Dependencies for Seq Explorer -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>

    <style>
        :root {
            /* Unified color system - single background hierarchy */
            --bg: #0a0e1a;              /* Base background - darkest */
            --bg-elevated: #0f1424;     /* Slightly elevated surfaces */
            --bg-panel: #141b2d;        /* Panel/card background */
            --border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --text: #e8ecff;
            --muted: #a9b3da;
            --sidebar-width: 260px;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        
        .lab-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            height: 36px;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            justify-content: space-between;
        }

        .lab-grid {
            flex: 1;
            display: grid;
            grid-template-areas:
                "sidebar main"
                "footer footer";
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: 1fr 320px;
            overflow: hidden;
            position: relative;
        }
        /* Loader overlays only the right half of main (scan-preview side); left half shows Niivue + demo ASAP */
        .loading-overlay.main-area-loader {
            grid-area: main;
            position: absolute;
            left: 50%;
            right: 0;
            top: 0;
            bottom: 0;
            z-index: 10;
        }
        .footer-wrapper.footer-pending {
            display: none !important;
        }
        #nv-viewer-container.viewer-waiting-demo {
            visibility: hidden;
        }
        .lab-grid.sidebar-collapsed {
            grid-template-columns: 30px 1fr;
        }

        #slot-sidebar { 
            grid-area: sidebar; 
            border-right: 1px solid var(--border); 
            border-bottom: 1px solid var(--border); 
            overflow-y: auto; 
            background: var(--bg-elevated); 
        }
        #slot-sidebar.sidebar-collapsed {
            min-width: 0;
            width: 100%;
            overflow: hidden;
        }
        #slot-sidebar.sidebar-collapsed .tabs-header {
            flex-direction: column;
            flex-wrap: nowrap;
        }
        #slot-sidebar.sidebar-collapsed .tab-btn {
            flex: 0 0 auto;
            min-height: 34px;
        }
        #slot-sidebar.sidebar-collapsed .tab-btn[data-tab="view"],
        #slot-sidebar.sidebar-collapsed .tab-btn[data-tab="fov"] {
            display: none;
        }
        #slot-main { 
            grid-area: main; 
            border-bottom: 1px solid var(--border); 
            overflow: hidden; 
            position: relative; 
            background: var(--bg);
        }
        #slot-main.scrollable { overflow-y: auto; }
        
        .footer-wrapper {
            grid-area: footer;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }
        .footer-wrapper .footer-card-dots { display: none; }
        #slot-footer { 
            flex: 1;
            min-height: 0;
            display: grid; 
            grid-template-columns: 1fr 0.8fr 1.5fr; 
            gap: 1px; 
            background: var(--border); 
            overflow: hidden; 
        }
        .footer-col { 
            background: var(--bg-elevated); 
            overflow-y: auto; 
            padding: 12px; 
            position: relative; 
        }

        /* Tab Styles for Sidebar */
        .tabbed-controls {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .tabs-header {
            display: flex;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            padding: 10px 5px;
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .tab-btn.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            background: var(--bg-elevated);
        }
        .tabs-content {
            flex: 1;
            overflow: hidden;
            padding: 2px;
            display: flex;
            flex-direction: column;
            background: var(--bg-elevated);
        }
        .tabs-content.panel-collapsed {
            display: none !important;
        }
        .tab-pane {
            display: none;
            height: 100%;
            overflow: hidden;
        }
        .tab-pane.active {
            display: flex;
            flex-direction: column;
        }

        /* Module Styles Override */
        .niivue-app, .standalone-viewer, .standalone-controls {
            height: 100% !important;
            width: 100% !important;
            background: transparent !important;
        }
        .seq-plot-container {
            height: 100% !important;
            background: var(--bg) !important;
        }
        #slot-footer .seq-explorer, #slot-footer .scan-module {
            height: 100%;
            background: transparent;
        }
    </style>
    <link rel="stylesheet" href="no_field_mobile.css" media="(max-width: 768px)">
</head>
<body>
    <div class="lab-shell">
        <header>
            <div class="header-content">
                <div class="header-title">No-field <span class="header-subtitle">Scanner</span><span class="app-version" aria-label="Version v0.1.2">v0.1.2</span></div>
                <button type="button" id="credits-btn" class="credits-btn" title="Credits &amp; dependencies"><i class="bi bi-award" aria-hidden="true"></i></button>
            </div>
        </header>
        <div id="credits-overlay" class="credits-overlay" hidden>
            <div class="credits-modal">
                <div class="credits-modal-header">
                    <h2 class="credits-modal-title">Credits</h2>
                    <button type="button" id="credits-close" class="credits-close" title="Close"><i class="bi bi-x-lg" aria-hidden="true"></i></button>
                </div>
                <div id="credits-content" class="credits-content">Loading…</div>
            </div>
        </div>
        
        <div class="lab-grid">
            <div id="slot-sidebar"></div>
            <div id="slot-main"></div>
            <div id="loader" class="loading-overlay main-area-loader" aria-hidden="true">
                <div class="scene">
                    <div class="shadow-nucleus"></div>
                    <div class="shadow-floor">
                        <div class="shadow-rotator">
                            <div class="shadow-bar">
                                <div class="shadow-head"></div>
                            </div>
                        </div>
                    </div>
                    <div class="nucleus"></div>
                    <div class="z-controller">
                        <div class="arrow-pivot">
                            <div class="stick-wrapper">
                                <div class="shaft"></div>
                                <div class="head"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="loader-text" class="loader-text"></div>
            </div>
            <div class="footer-wrapper footer-pending">
                <div class="footer-card-dots" id="footer-card-dots" aria-hidden="true">
                    <span class="footer-card-tab" data-card="0">seq</span>
                    <span class="footer-card-dot-sep" aria-hidden="true">•</span>
                    <span class="footer-card-tab" data-card="1">prot</span>
                    <span class="footer-card-dot-sep" aria-hidden="true">•</span>
                    <span class="footer-card-tab" data-card="2">scan</span>
                </div>
                <div id="slot-footer">
                    <div id="col-tree" class="footer-col"></div>
                    <div id="col-scan" class="footer-col"></div>
                    <div id="col-params" class="footer-col"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden cache for modules when they are not in a slot -->
    <div id="module-cache" style="display: none;">
        <div id="nv-viewer-container" class="niivue-app"></div>
        <div id="nv-scan-preview-container" class="niivue-app"></div>
        <div id="nv-controls-container" class="niivue-app"></div>
        <div id="seq-tree-container" class="seq-explorer"></div>
        <div id="seq-params-container" class="seq-explorer"></div>
        <div id="seq-plot-container" class="seq-explorer"></div>
        <div id="scan-module-container" class="scan-module"></div>
    </div>

    <script type="module">
        import { NiivueModule, ScanPreviewModule } from './niivue_app.js';
        import { SequenceExplorer } from './pypulseq/seq_explorer.js';
        import { ScanModule } from './scan_zero/scan_module.js';
        import { eventHub } from './event_hub.js';

        // URL flag: ?pro=1 enables pro/debug behavior. Modules (seq_explorer, niivue_app, scan_module) can check window.pro
        const urlParams = new URLSearchParams(window.location.search);
        window.pro = /^1|true|yes$/i.test(urlParams.get('pro') || '');

        class ViewManager {
            constructor(nvModule, seqExplorer, scanModule, scanPreview) {
                this.nv = nvModule;
                this.seq = seqExplorer;
                this.scan = scanModule;
                this.preview = scanPreview;
                this.currentMode = null;
                this.maximizedViewer = null; // null = both visible, 'nvViewer' or 'nvScanPreview' = maximized
                this.slots = {
                    sidebar: document.getElementById('slot-sidebar'),
                    main: document.getElementById('slot-main'),
                    tree: document.getElementById('col-tree'),
                    scan: document.getElementById('col-scan'),
                    params: document.getElementById('col-params')
                };
                this.cache = {
                    nvViewer: document.getElementById('nv-viewer-container'),
                    nvScanPreview: document.getElementById('nv-scan-preview-container'),
                    nvControls: document.getElementById('nv-controls-container'),
                    seqTree: document.getElementById('seq-tree-container'),
                    seqParams: document.getElementById('seq-params-container'),
                    seqPlot: document.getElementById('seq-plot-container'),
                    scanModule: document.getElementById('scan-module-container')
                };
                
                // Listen for toggle maximize events
                eventHub.on('toggleViewerMaximize', ({ containerId }) => {
                    this.toggleViewerMaximize(containerId);
                });
            }
            
            toggleViewerMaximize(containerId) {
                if (this.currentMode !== 'planning') return;
                
                // Determine which viewer was double-tapped
                let tappedViewer = null;
                if (containerId === 'nv-viewer-container') tappedViewer = 'nvViewer';
                else if (containerId === 'nv-scan-preview-container') tappedViewer = 'nvScanPreview';
                else return;
                
                // Toggle logic
                if (this.maximizedViewer === tappedViewer) {
                    // Already maximized - restore both
                    this.maximizedViewer = null;
                } else {
                    // Maximize the tapped viewer
                    this.maximizedViewer = tappedViewer;
                }
                
                // Apply the layout
                this.applyViewerLayout();
            }
            
            applyViewerLayout() {
                const viewer = this.cache.nvViewer;
                const preview = this.cache.nvScanPreview;
                
                if (this.maximizedViewer === 'nvViewer') {
                    viewer.style.flex = '1';
                    viewer.style.display = '';
                    preview.style.display = 'none';
                } else if (this.maximizedViewer === 'nvScanPreview') {
                    preview.style.flex = '1';
                    preview.style.display = '';
                    preview.style.borderLeft = 'none';
                    viewer.style.display = 'none';
                } else {
                    // Both visible
                    viewer.style.flex = '1';
                    viewer.style.display = '';
                    preview.style.flex = '1';
                    preview.style.display = '';
                    preview.style.borderLeft = '1px solid var(--border)';
                }
                
                // Trigger resize for Niivue
                setTimeout(() => {
                    if (this.nv?.nv && viewer.style.display !== 'none') {
                        this.nv.nv.resizeListener();
                    }
                    if (this.preview?.nv && preview.style.display !== 'none') {
                        this.preview.nv.resizeListener();
                    }
                }, 50);
            }

            moveToSlot(moduleName, slotName) {
                const content = this.cache[moduleName];
                const slot = this.slots[slotName];
                if (content && slot) {
                    slot.appendChild(content);
                }
            }

            setMode(mode, autoPlot = false) {
                console.log('Switching to mode:', mode);
                this.currentMode = mode;
                
                // Clear slots
                this.slots.sidebar.innerHTML = '';
                this.slots.main.innerHTML = '';
                this.slots.tree.innerHTML = '';
                this.slots.scan.innerHTML = '';
                this.slots.params.innerHTML = '';

                // Always fixed parts
                this.moveToSlot('nvControls', 'sidebar');
                this.moveToSlot('seqTree', 'tree');
                this.moveToSlot('scanModule', 'scan');
                this.moveToSlot('seqParams', 'params');

                if (mode === 'planning') {
                    // Side-by-side layout: main viewer (50%) + scan preview (50%)
                    this.slots.main.style.display = 'flex';
                    this.slots.main.style.flexDirection = 'row';
                    this.cache.nvViewer.style.display = '';
                    this.cache.nvScanPreview.style.display = '';
                    this.moveToSlot('nvViewer', 'main');
                    this.moveToSlot('nvScanPreview', 'main');
                    this.slots.main.classList.remove('scrollable');
                    // Apply current maximize state (or default to both visible)
                    this.applyViewerLayout();
                } else if (mode === 'sequence') {
                    // Reset maximize state when leaving planning mode
                    this.maximizedViewer = null;
                    // Full width for sequence plot
                    this.slots.main.style.display = '';
                    this.slots.main.style.flexDirection = '';
                    this.moveToSlot('seqPlot', 'main');
                    this.slots.main.classList.add('scrollable');
                    
                    // Trigger plot if requested and not already plotting
                    if (autoPlot && this.seq && this.seq.selectedSequence) {
                        this.seq.executeFunction();
                    }
                }
                
                // Notify Niivue to resize
                if (this.nv && this.nv.nv) {
                    setTimeout(() => {
                        this.nv.nv.resizeListener();
                        // Force grid layout again after resize
                        if (typeof this.nv.nv.setMultiplanarLayout === 'function') {
                            this.nv.nv.setMultiplanarLayout(2); // GRID
                        }
                    }, 50);
                }
                if (this.preview && this.preview.nv) {
                    setTimeout(() => {
                        this.preview.nv.resizeListener();
                        // Force grid layout again after resize
                        if (typeof this.preview.nv.setMultiplanarLayout === 'function') {
                            this.preview.nv.setMultiplanarLayout(2); // GRID
                        }
                    }, 50);
                }
            }
        }

        async function bootstrap() {
            try {
                // A. START PYODIDE & PACKAGES IN BACKGROUND (do not await)
                const pyodidePromise = (async () => {
                    const py = await loadPyodide({
                        indexURL: "https://cdn.jsdelivr.net/pyodide/v0.29.0/full/",
                    });
                    await py.loadPackage(['numpy', 'scipy', 'micropip']);
                    const micropip = py.pyimport("micropip");
                    // Pin pypulseq: conseq rejects Pulseq file format 1.5.x; 1.4.2.post2 writes an older version line.
                    await Promise.all([
                        micropip.install('pypulseq==1.4.2.post2'),
                        micropip.install('nibabel')
                    ]);
                    return py;
                })();

                // B. FAST PATH: show sidebar + main (Niivue) immediately
                const nvModule = new NiivueModule();
                nvModule.renderViewer('nv-viewer-container');
                nvModule.renderControls('nv-controls-container', true);

                const explorer = new SequenceExplorer(null, {
                    sources: [],
                    onFunctionStart: () => {
                        if (window.viewManager) {
                            window.viewManager.setMode('sequence');
                        }
                    }
                });
                explorer.renderTree('seq-tree-container');
                explorer.renderParams('seq-params-container');
                explorer.renderPlot('seq-plot-container');

                const scanModule = new ScanModule();
                scanModule.render('scan-module-container');

                const scanPreview = new ScanPreviewModule();
                scanPreview.render('nv-scan-preview-container');

                const configPromise = explorer.getDefaultSourcesConfig();

                const viewManager = new ViewManager(nvModule, explorer, scanModule, scanPreview);
                viewManager.setMode('planning');

                const mainViewerEl = document.getElementById('nv-viewer-container');
                if (mainViewerEl) mainViewerEl.classList.add('viewer-waiting-demo');
                const phantomReady = nvModule.loadBundledDefaultPhantom().then(() => {
                    if (mainViewerEl) mainViewerEl.classList.remove('viewer-waiting-demo');
                }).catch((err) => {
                    console.error('Default phantom load failed:', err);
                    if (mainViewerEl) mainViewerEl.classList.remove('viewer-waiting-demo');
                });

                window.viewManager = viewManager;
                window.nvModule = nvModule;
                window.seqExplorer = explorer;
                window.scanPreview = scanPreview;

                // Footer listeners (footer stays hidden until Pyodide ready)
                (function initFooterCardDots() {
                    const footer = document.getElementById('slot-footer');
                    const dots = document.getElementById('footer-card-dots');
                    if (!footer || !dots) return;
                    const tabEls = dots.querySelectorAll('.footer-card-tab[data-card]');
                    if (tabEls.length !== 3) return;
                    function isCompactLayout() {
                        return window.matchMedia('(max-width: 768px)').matches ||
                            document.querySelector('.lab-shell')?.classList.contains('compact-mode');
                    }
                    const updateActive = () => {
                        const cardWidth = footer.scrollWidth / 3;
                        const idx = Math.round(footer.scrollLeft / cardWidth);
                        const i = Math.max(0, Math.min(2, idx));
                        tabEls.forEach((el, k) => el.classList.toggle('active', k === i));
                    };
                    footer.addEventListener('scroll', updateActive, { passive: true });
                    updateActive();

                    tabEls.forEach((el, i) => {
                        el.addEventListener('click', () => {
                            if (!isCompactLayout()) return;
                            const cardWidth = footer.scrollWidth / 3;
                            footer.scrollTo({ left: i * cardWidth, behavior: 'smooth' });
                        });
                    });

                    let dotsStartX = 0;
                    dots.addEventListener('touchstart', (e) => {
                        if (!isCompactLayout()) return;
                        dotsStartX = e.touches[0].clientX;
                    }, { passive: true });
                    dots.addEventListener('touchend', (e) => {
                        if (!isCompactLayout()) return;
                        const endX = e.changedTouches[0].clientX;
                        const delta = dotsStartX - endX;
                        const cardWidth = footer.scrollWidth / 3;
                        if (delta > 40) {
                            const next = Math.min(2, Math.round(footer.scrollLeft / cardWidth) + 1);
                            footer.scrollTo({ left: next * cardWidth, behavior: 'smooth' });
                        } else if (delta < -40) {
                            const prev = Math.max(0, Math.round(footer.scrollLeft / cardWidth) - 1);
                            footer.scrollTo({ left: prev * cardWidth, behavior: 'smooth' });
                        }
                    }, { passive: true });
                })();

                // Start with sidebar collapsed on mobile
                (function initMobileSidebarCollapsed() {
                    if (!window.matchMedia('(max-width: 768px)').matches) return;
                    const labGrid = document.querySelector('.lab-grid');
                    const slotSidebar = document.getElementById('slot-sidebar');
                    const tabsContent = document.querySelector('.tabs-content');
                    const viewerBtn = document.querySelector('.tab-btn[data-tab="source"]');
                    if (labGrid && slotSidebar) {
                        labGrid.classList.add('sidebar-collapsed');
                        slotSidebar.classList.add('sidebar-collapsed');
                        if (tabsContent) tabsContent.classList.add('panel-collapsed');
                        if (viewerBtn) {
                            viewerBtn.textContent = viewerBtn.dataset.collapsedLabel || 'V';
                        }
                    }
                })();

                // Swipe left on sidebar to collapse, swipe right to expand (mobile)
                (function initSidebarSwipe() {
                    const sidebar = document.getElementById('slot-sidebar');
                    if (!sidebar) return;
                    let startX = 0;
                    const threshold = 50;
                    sidebar.addEventListener('touchstart', (e) => {
                        if (!window.matchMedia('(max-width: 768px)').matches) return;
                        startX = e.touches[0].clientX;
                    }, { passive: true });
                    sidebar.addEventListener('touchend', (e) => {
                        if (!window.matchMedia('(max-width: 768px)').matches) return;
                        const endX = e.changedTouches[0].clientX;
                        const delta = startX - endX;
                        const btn = sidebar.querySelector('.tab-btn[data-tab="source"]');
                        const labGrid = sidebar.closest('.lab-grid');
                        const tabsContent = sidebar.querySelector('.tabs-content');
                        if (!btn || !labGrid || !btn.classList.contains('active')) return;
                        if (delta > threshold) {
                            if (!labGrid.classList.contains('sidebar-collapsed')) {
                                labGrid.classList.add('sidebar-collapsed');
                                sidebar.classList.add('sidebar-collapsed');
                                if (tabsContent) tabsContent.classList.add('panel-collapsed');
                                btn.textContent = btn.dataset.collapsedLabel || 'V';
                            }
                        } else if (delta < -threshold) {
                            if (labGrid.classList.contains('sidebar-collapsed')) {
                                labGrid.classList.remove('sidebar-collapsed');
                                sidebar.classList.remove('sidebar-collapsed');
                                if (tabsContent) tabsContent.classList.remove('panel-collapsed');
                                btn.textContent = btn.dataset.fullLabel || 'VIEWER';
                            }
                        }
                    }, { passive: true });
                })();

                // C. WHEN PYODIDE IS READY: finish setup, then hide loader and show footer
                function hideLoaderAndShowFooter() {
                    const loaderEl = document.getElementById('loader');
                    const footerWrapper = document.querySelector('.footer-wrapper');
                    if (loaderEl) loaderEl.classList.add('hidden');
                    if (footerWrapper) footerWrapper.classList.remove('footer-pending');
                }

                pyodidePromise.then(async (pyodide) => {
                    nvModule.pyodide = pyodide;
                    explorer.config.pyodide = pyodide;
                    const configCode = await configPromise;
                    await Promise.all([
                        nvModule.initPyodide(),
                        explorer.detectVersions(),
                        explorer.loadSourcesFromConfig(configCode)
                    ]);
                    if (nvModule._pendingPhantomVfs) {
                        const { jsonFile, niftiFiles } = nvModule._pendingPhantomVfs;
                        try {
                            await nvModule.populatePyodideVFS(niftiFiles, [jsonFile]);
                        } catch (err) {
                            console.warn('Sync default phantom to Pyodide VFS failed:', err);
                        }
                        nvModule._pendingPhantomVfs = null;
                    }
                    if (nvModule.options.showJsonTab) nvModule.updateJsonTab();
                    await phantomReady.catch(() => {});
                    hideLoaderAndShowFooter();
                    // Plot stack (matplotlib + optimized plot) non-blocking; await in explorer when user runs first plot
                    explorer._plotStackReady = pyodide.loadPackage('matplotlib')
                        .then(() => explorer.installOptimizedPlotFunction())
                        .then(() => explorer.detectVersions())
                        .catch((e) => {
                            console.warn('Plot stack load failed:', e);
                        });
                }).catch(async (e) => {
                    console.error("Pyodide/background setup failed:", e);
                    await phantomReady.catch(() => {});
                    hideLoaderAndShowFooter();
                });

            } catch (e) {
                console.error("Bootstrap failed:", e);
            }
        }

        bootstrap();

        // Credits popup
        (function () {
            const btn = document.getElementById('credits-btn');
            const overlay = document.getElementById('credits-overlay');
            const content = document.getElementById('credits-content');
            const closeBtn = document.getElementById('credits-close');

            async function openCredits() {
                overlay.hidden = false;
                content.textContent = 'Loading…';
                try {
                    const res = await fetch('credits.md');
                    const text = await res.text();
                    const { marked } = await import('https://esm.run/marked@12.0.0');
                    content.innerHTML = marked.parse(text);
                } catch (e) {
                    content.textContent = 'Could not load credits. ' + (e && e.message ? e.message : '');
                }
            }

            function closeCredits() {
                overlay.hidden = true;
            }

            if (btn) btn.addEventListener('click', openCredits);
            if (closeBtn) closeBtn.addEventListener('click', closeCredits);
            overlay.addEventListener('click', (e) => { if (e.target === overlay) closeCredits(); });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !overlay.hidden) closeCredits(); });
        })();
    </script>
</body>
</html>
