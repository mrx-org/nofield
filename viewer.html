<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Niivue Modular App</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.0/full/pyodide.js"></script>
    <link rel="stylesheet" href="niivue_app.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <style>
      html, body { height: 100%; margin: 0; padding: 0; background: #0b1020; }
      #niivue-container { height: 100%; width: 100%; }
    </style>
  </head>
  <body>
    <div id="niivue-container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script type="module">
      import { initNiivueApp } from './niivue_app.js';

      // URL flag: ?pro=1 enables pro/debug behavior (same as index.html). Modules can check window.pro
      const urlParams = new URLSearchParams(window.location.search);
      window.pro = /^1|true|yes$/i.test(urlParams.get('pro') || '');

      // Standalone mode: auto-initialize
      window.addEventListener('DOMContentLoaded', async () => {
        try {
          await initNiivueApp('niivue-container', {}); // JSON tab shown when ?pro=1 (window.pro)
        } catch (e) {
          console.error("Initialization failed:", e);
        }
      });
    </script>
  </body>
</html>
