<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR0 Lab - Component Dashboard</title>
    
    <!-- Dependencies for Niivue App -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.0/full/pyodide.js"></script>
    <link rel="stylesheet" href="niivue_app.css">
    
    <!-- Dependencies for Seq Explorer -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <link rel="stylesheet" href="pypulseq/seq_explorer.css">

    <style>
        :root {
            --bg: #0b1020;
            --panel-bg: #141b2d;
            --border: rgba(255, 255, 255, 0.12);
            --accent: #3b82f6;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: var(--bg);
            color: #e8ecff;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        
        .lab-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            height: 50px;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            justify-content: space-between;
        }

        .mode-selector {
            display: flex;
            gap: 1rem;
        }

        .mode-btn {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        .mode-btn.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .lab-grid {
            flex: 1;
            display: grid;
            grid-template-areas:
                "sidebar main"
                "footer footer";
            grid-template-columns: 380px 1fr;
            grid-template-rows: 1fr 320px;
            overflow: hidden;
        }

        #slot-sidebar { grid-area: sidebar; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); overflow-y: auto; background: var(--bg); }
        #slot-main { grid-area: main; border-bottom: 1px solid var(--border); overflow: hidden; position: relative; }
        #slot-footer { grid-area: footer; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); overflow: hidden; border-top: 1px solid var(--border); }
        
        .footer-col { background: var(--bg); overflow-y: auto; padding: 12px; position: relative; }
        .footer-col:first-child { border-right: 1px solid var(--border); }

        /* Tab Styles for Sidebar */
        .tabbed-controls {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .tabs-header {
            display: flex;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            padding: 10px 5px;
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .tab-btn.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            background: rgba(255,255,255,0.05);
        }
        .tabs-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(59, 130, 246, 0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Module Styles Override */
        .niivue-app, .standalone-viewer, .standalone-controls {
            height: 100% !important;
            width: 100% !important;
        }
        .seq-plot-container {
            height: 100% !important;
        }
        #slot-footer .seq-explorer {
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <div id="loader-text">Initializing MR0 Lab...</div>
    </div>

    <div class="lab-shell">
        <header>
            <div style="display: flex; align-items: center; gap: 2rem;">
                <div style="font-weight: bold; font-size: 1.2rem;">MR0 Lab <span style="font-weight: normal; color: var(--accent);">Dashboard</span></div>
                <div class="mode-selector">
                    <button id="btn-mode-planning" class="mode-btn active">Planning Mode</button>
                    <button id="btn-mode-sequence" class="mode-btn">Sequence Mode</button>
                </div>
            </div>
            <div class="header-actions" style="display: flex; gap: 0.5rem;">
                <button class="mode-btn" onclick="location.reload()">Reset Lab</button>
                <button class="mode-btn" onclick="window.open('index.html', '_blank')">Niivue Standalone</button>
                <button class="mode-btn" onclick="window.open('pypulseq/seq_explorer.html', '_blank')">Explorer Standalone</button>
            </div>
        </header>
        
        <div class="lab-grid">
            <div id="slot-sidebar"></div>
            <div id="slot-main"></div>
            <div id="slot-footer">
                <div id="col-tree" class="footer-col"></div>
                <div id="col-params" class="footer-col"></div>
            </div>
        </div>
    </div>

    <!-- Hidden cache for modules when they are not in a slot -->
    <div id="module-cache" style="display: none;">
        <div id="nv-viewer-container" class="niivue-app"></div>
        <div id="nv-controls-container" class="niivue-app"></div>
        <div id="seq-tree-container" class="seq-explorer"></div>
        <div id="seq-params-container" class="seq-explorer"></div>
        <div id="seq-plot-container" class="seq-explorer"></div>
    </div>

    <script type="module">
        import { NiivueModule } from './niivue_app.js';
        import { SequenceExplorer } from './pypulseq/seq_explorer.js';
        import { eventHub } from './event_hub.js';

        class ViewManager {
            constructor(nvModule, seqExplorer) {
                this.nv = nvModule;
                this.seq = seqExplorer;
                this.slots = {
                    sidebar: document.getElementById('slot-sidebar'),
                    main: document.getElementById('slot-main'),
                    tree: document.getElementById('col-tree'),
                    params: document.getElementById('col-params')
                };
                this.cache = {
                    nvViewer: document.getElementById('nv-viewer-container'),
                    nvControls: document.getElementById('nv-controls-container'),
                    seqTree: document.getElementById('seq-tree-container'),
                    seqParams: document.getElementById('seq-params-container'),
                    seqPlot: document.getElementById('seq-plot-container')
                };
            }

            moveToSlot(moduleName, slotName) {
                const content = this.cache[moduleName];
                const slot = this.slots[slotName];
                if (content && slot) {
                    slot.appendChild(content);
                }
            }

            setMode(mode) {
                console.log('Switching to mode:', mode);
                
                // Clear slots
                this.slots.sidebar.innerHTML = '';
                this.slots.main.innerHTML = '';
                this.slots.tree.innerHTML = '';
                this.slots.params.innerHTML = '';

                // Always fixed parts
                this.moveToSlot('nvControls', 'sidebar');
                this.moveToSlot('seqTree', 'tree');
                this.moveToSlot('seqParams', 'params');

                if (mode === 'planning') {
                    this.moveToSlot('nvViewer', 'main');
                    document.getElementById('btn-mode-planning').classList.add('active');
                    document.getElementById('btn-mode-sequence').classList.remove('active');
                } else if (mode === 'sequence') {
                    this.moveToSlot('seqPlot', 'main');
                    document.getElementById('btn-mode-planning').classList.remove('active');
                    document.getElementById('btn-mode-sequence').classList.add('active');
                }
                
                // Notify Niivue to resize
                if (this.nv && this.nv.nv) {
                    setTimeout(() => this.nv.nv.resizeListener(), 50);
                }
            }
        }

        async function bootstrap() {
            const loaderText = document.getElementById('loader-text');
            
            try {
                // 1. Initialize Pyodide
                loaderText.textContent = "Loading Pyodide runtime...";
                const pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.29.0/full/",
                });
                
                // 2. Load packages
                loaderText.textContent = "Installing Python dependencies...";
                await pyodide.loadPackage(['numpy', 'scipy', 'matplotlib', 'micropip']);
                const micropip = pyodide.pyimport("micropip");
                await micropip.install(['pypulseq', 'nibabel']);

                // 3. Initialize Modules
                loaderText.textContent = "Initializing Niivue Module...";
                const nvModule = new NiivueModule({ pyodide });
                nvModule.renderViewer('nv-viewer-container');
                // Use tabbed controls for the sidebar
                nvModule.renderControls('nv-controls-container', true);

                loaderText.textContent = "Initializing Sequence Explorer...";
                const explorer = new SequenceExplorer(null, {
                    pyodide,
                    sources: []
                });
                explorer.renderTree('seq-tree-container');
                explorer.renderParams('seq-params-container');
                explorer.renderPlot('seq-plot-container');

                await explorer.installOptimizedPlotFunction();
                await explorer.detectVersions();
                await explorer.loadDefaultSources();

                // 4. Initialize ViewManager
                const viewManager = new ViewManager(nvModule, explorer);
                viewManager.setMode('planning');

                // Mode switching
                document.getElementById('btn-mode-planning').onclick = () => viewManager.setMode('planning');
                document.getElementById('btn-mode-sequence').onclick = () => viewManager.setMode('sequence');

                // Hide loader
                document.getElementById('loader').classList.add('hidden');
                
                window.viewManager = viewManager;
                window.nvModule = nvModule;
                window.seqExplorer = explorer;

            } catch (e) {
                console.error("Bootstrap failed:", e);
                loaderText.textContent = "Error during initialization: " + e.message;
                loaderText.style.color = "#ef4444";
            }
        }

        bootstrap();
    </script>
</body>
</html>
