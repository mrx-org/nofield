<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No-field Scanner</title>
    
    <!-- Dependencies for Niivue App -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.0/full/pyodide.js"></script>
    
    <!-- CSS Loading Order: Base styles first, then modules, then master override -->
    <link rel="stylesheet" href="startup.css">
    <link rel="stylesheet" href="niivue_app.css">
    <link rel="stylesheet" href="pypulseq/seq_explorer.css">
    <link rel="stylesheet" href="scan_zero/scan_module.css">
    <link rel="stylesheet" href="no_field.css"> <!-- Master override LAST -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Dependencies for Seq Explorer -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>

    <style>
        :root {
            /* Unified color system - single background hierarchy */
            --bg: #0a0e1a;              /* Base background - darkest */
            --bg-elevated: #0f1424;     /* Slightly elevated surfaces */
            --bg-panel: #141b2d;        /* Panel/card background */
            --border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --text: #e8ecff;
            --muted: #a9b3da;
            --sidebar-width: 260px;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        
        .lab-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            height: 36px;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            justify-content: space-between;
        }

        .lab-grid {
            flex: 1;
            display: grid;
            grid-template-areas:
                "sidebar main"
                "footer footer";
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: 1fr 320px;
            overflow: hidden;
        }
        .lab-grid.sidebar-collapsed {
            grid-template-columns: 100px 1fr;
        }

        #slot-sidebar { 
            grid-area: sidebar; 
            border-right: 1px solid var(--border); 
            border-bottom: 1px solid var(--border); 
            overflow-y: auto; 
            background: var(--bg-elevated); 
        }
        #slot-sidebar.sidebar-collapsed {
            min-width: 0;
            width: 100%;
            overflow: hidden;
        }
        #slot-sidebar.sidebar-collapsed .tabs-header {
            flex-direction: column;
            flex-wrap: nowrap;
        }
        #slot-sidebar.sidebar-collapsed .tab-btn {
            flex: 0 0 auto;
            min-height: 34px;
        }
        #slot-sidebar.sidebar-collapsed .tab-btn[data-tab="view"],
        #slot-sidebar.sidebar-collapsed .tab-btn[data-tab="fov"] {
            display: none;
        }
        #slot-main { 
            grid-area: main; 
            border-bottom: 1px solid var(--border); 
            overflow: hidden; 
            position: relative; 
            background: var(--bg);
        }
        #slot-main.scrollable { overflow-y: auto; }
        
        #slot-footer { 
            grid-area: footer; 
            display: grid; 
            grid-template-columns: 1fr 0.8fr 1.5fr; 
            gap: 1px; 
            background: var(--border); 
            overflow: hidden; 
        }
        
        .footer-col { 
            background: var(--bg-elevated); 
            overflow-y: auto; 
            padding: 12px; 
            position: relative; 
        }

        /* Tab Styles for Sidebar */
        .tabbed-controls {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .tabs-header {
            display: flex;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            padding: 10px 5px;
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .tab-btn.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            background: var(--bg-elevated);
        }
        .tabs-content {
            flex: 1;
            overflow: hidden;
            padding: 2px;
            display: flex;
            flex-direction: column;
            background: var(--bg-elevated);
        }
        .tabs-content.panel-collapsed {
            display: none !important;
        }
        .tab-pane {
            display: none;
            height: 100%;
            overflow: hidden;
        }
        .tab-pane.active {
            display: flex;
            flex-direction: column;
        }

        /* Module Styles Override */
        .niivue-app, .standalone-viewer, .standalone-controls {
            height: 100% !important;
            width: 100% !important;
            background: transparent !important;
        }
        .seq-plot-container {
            height: 100% !important;
            background: var(--bg) !important;
        }
        #slot-footer .seq-explorer, #slot-footer .scan-module {
            height: 100%;
            background: transparent;
        }
    </style>
</head>
<body>
        <div id="loader" class="loading-overlay">
        <div class="scene">
            <div class="shadow-nucleus"></div>
            <div class="shadow-floor">
                <div class="shadow-rotator">
                    <div class="shadow-bar">
                        <div class="shadow-head"></div>
                    </div>
                </div>
            </div>
            <div class="nucleus"></div>
            <div class="z-controller">
                <div class="arrow-pivot">
                    <div class="stick-wrapper">
                        <div class="shaft"></div>
                        <div class="head"></div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Text is driven purely by CSS (.loader-text::after) during loading -->
        <div id="loader-text" class="loader-text"></div>
    </div>

    <div class="lab-shell">
        <header>
            <div class="header-content">
                <div class="header-title">No-field <span class="header-subtitle">Scanner</span></div>
                <button type="button" id="credits-btn" class="credits-btn" title="Credits &amp; dependencies"><i class="bi bi-award" aria-hidden="true"></i></button>
            </div>
        </header>
        <div id="credits-overlay" class="credits-overlay" hidden>
            <div class="credits-modal">
                <div class="credits-modal-header">
                    <h2 class="credits-modal-title">Credits</h2>
                    <button type="button" id="credits-close" class="credits-close" title="Close"><i class="bi bi-x-lg" aria-hidden="true"></i></button>
                </div>
                <div id="credits-content" class="credits-content">Loading…</div>
            </div>
        </div>
        
        <div class="lab-grid">
            <div id="slot-sidebar"></div>
            <div id="slot-main"></div>
            <div id="slot-footer">
                <div id="col-tree" class="footer-col"></div>
                <div id="col-scan" class="footer-col"></div>
                <div id="col-params" class="footer-col"></div>
            </div>
        </div>
    </div>

    <!-- Hidden cache for modules when they are not in a slot -->
    <div id="module-cache" style="display: none;">
        <div id="nv-viewer-container" class="niivue-app"></div>
        <div id="nv-scan-preview-container" class="niivue-app"></div>
        <div id="nv-controls-container" class="niivue-app"></div>
        <div id="seq-tree-container" class="seq-explorer"></div>
        <div id="seq-params-container" class="seq-explorer"></div>
        <div id="seq-plot-container" class="seq-explorer"></div>
        <div id="scan-module-container" class="scan-module"></div>
    </div>

    <script type="module">
        import { NiivueModule, ScanPreviewModule } from './niivue_app.js';
        import { SequenceExplorer } from './pypulseq/seq_explorer.js';
        import { ScanModule } from './scan_zero/scan_module.js';
        import { eventHub } from './event_hub.js';

        class ViewManager {
            constructor(nvModule, seqExplorer, scanModule, scanPreview) {
                this.nv = nvModule;
                this.seq = seqExplorer;
                this.scan = scanModule;
                this.preview = scanPreview;
                this.currentMode = null;
                this.slots = {
                    sidebar: document.getElementById('slot-sidebar'),
                    main: document.getElementById('slot-main'),
                    tree: document.getElementById('col-tree'),
                    scan: document.getElementById('col-scan'),
                    params: document.getElementById('col-params')
                };
                this.cache = {
                    nvViewer: document.getElementById('nv-viewer-container'),
                    nvScanPreview: document.getElementById('nv-scan-preview-container'),
                    nvControls: document.getElementById('nv-controls-container'),
                    seqTree: document.getElementById('seq-tree-container'),
                    seqParams: document.getElementById('seq-params-container'),
                    seqPlot: document.getElementById('seq-plot-container'),
                    scanModule: document.getElementById('scan-module-container')
                };
            }

            moveToSlot(moduleName, slotName) {
                const content = this.cache[moduleName];
                const slot = this.slots[slotName];
                if (content && slot) {
                    slot.appendChild(content);
                }
            }

            setMode(mode, autoPlot = false) {
                console.log('Switching to mode:', mode);
                this.currentMode = mode;
                
                // Clear slots
                this.slots.sidebar.innerHTML = '';
                this.slots.main.innerHTML = '';
                this.slots.tree.innerHTML = '';
                this.slots.scan.innerHTML = '';
                this.slots.params.innerHTML = '';

                // Always fixed parts
                this.moveToSlot('nvControls', 'sidebar');
                this.moveToSlot('seqTree', 'tree');
                this.moveToSlot('scanModule', 'scan');
                this.moveToSlot('seqParams', 'params');

                if (mode === 'planning') {
                    // Side-by-side layout: main viewer (50%) + scan preview (50%)
                    this.slots.main.style.display = 'flex';
                    this.slots.main.style.flexDirection = 'row';
                    this.cache.nvViewer.style.flex = '1';
                    this.cache.nvScanPreview.style.flex = '1';
                    this.cache.nvScanPreview.style.borderLeft = '1px solid var(--border)';
                    this.moveToSlot('nvViewer', 'main');
                    this.moveToSlot('nvScanPreview', 'main');
                    this.slots.main.classList.remove('scrollable');
                } else if (mode === 'sequence') {
                    // Full width for sequence plot
                    this.slots.main.style.display = '';
                    this.slots.main.style.flexDirection = '';
                    this.moveToSlot('seqPlot', 'main');
                    this.slots.main.classList.add('scrollable');
                    
                    // Trigger plot if requested and not already plotting
                    if (autoPlot && this.seq && this.seq.selectedSequence) {
                        this.seq.executeFunction();
                    }
                }
                
                // Notify Niivue to resize
                if (this.nv && this.nv.nv) {
                    setTimeout(() => {
                        this.nv.nv.resizeListener();
                        // Force grid layout again after resize
                        if (typeof this.nv.nv.setMultiplanarLayout === 'function') {
                            this.nv.nv.setMultiplanarLayout(2); // GRID
                        }
                    }, 50);
                }
                if (this.preview && this.preview.nv) {
                    setTimeout(() => {
                        this.preview.nv.resizeListener();
                        // Force grid layout again after resize
                        if (typeof this.preview.nv.setMultiplanarLayout === 'function') {
                            this.preview.nv.setMultiplanarLayout(2); // GRID
                        }
                    }, 50);
                }
            }
        }

        async function bootstrap() {
            const loaderText = document.getElementById('loader-text');
            
            try {
                // A. START PYODIDE & PACKAGES IN BACKGROUND
                const pyodidePromise = (async () => {
                    const py = await loadPyodide({
                        indexURL: "https://cdn.jsdelivr.net/pyodide/v0.29.0/full/",
                    });
                    await py.loadPackage(['numpy', 'scipy', 'matplotlib', 'micropip']);
                    
                    const micropip = py.pyimport("micropip");
                    await micropip.install(['pypulseq', 'nibabel']);
                    return py;
                })();

                // B. INITIALIZE MODULES IMMEDIATELY (Parallel to Step A)
                const nvModule = new NiivueModule(); 
                nvModule.renderViewer('nv-viewer-container');
                nvModule.renderControls('nv-controls-container', true);

                const explorer = new SequenceExplorer(null, {
                    sources: [],
                    onFunctionStart: () => {
                        if (window.viewManager) {
                            window.viewManager.setMode('sequence');
                        }
                    }
                });
                explorer.renderTree('seq-tree-container');
                explorer.renderParams('seq-params-container');
                explorer.renderPlot('seq-plot-container');

                const scanModule = new ScanModule();
                scanModule.render('scan-module-container');

                const scanPreview = new ScanPreviewModule();
                scanPreview.render('nv-scan-preview-container');

                // C. FETCH CONFIG IN PARALLEL
                const configPromise = explorer.getDefaultSourcesConfig();

                // D. WAIT FOR PYTHON TO BE READY
                const pyodide = await pyodidePromise;
                nvModule.pyodide = pyodide;
                explorer.config.pyodide = pyodide;

                // E. RUN PYTHON-DEPENDENT SETUP IN PARALLEL
                const configCode = await configPromise;
                await Promise.all([
                    nvModule.initPyodide(), // Initialize resampling tools on the shared instance
                    explorer.installOptimizedPlotFunction(),
                    explorer.detectVersions(),
                    explorer.loadSourcesFromConfig(configCode)
                ]);

                // 4. Initialize ViewManager
                const viewManager = new ViewManager(nvModule, explorer, scanModule, scanPreview);
                viewManager.setMode('planning');

                // Load demo volume on startup
                nvModule.loadUrl(nvModule.DEMO_URL, "mni152.nii.gz", true);

                // Hide loader
                document.getElementById('loader').classList.add('hidden');
                
                window.viewManager = viewManager;
                window.nvModule = nvModule;
                window.seqExplorer = explorer;
                window.scanPreview = scanPreview;

            } catch (e) {
                console.error("Bootstrap failed:", e);
            }
        }

        bootstrap();

        // Credits popup
        (function () {
            const btn = document.getElementById('credits-btn');
            const overlay = document.getElementById('credits-overlay');
            const content = document.getElementById('credits-content');
            const closeBtn = document.getElementById('credits-close');

            async function openCredits() {
                overlay.hidden = false;
                content.textContent = 'Loading…';
                try {
                    const res = await fetch('credits.md');
                    const text = await res.text();
                    const { marked } = await import('https://esm.run/marked@12.0.0');
                    content.innerHTML = marked.parse(text);
                } catch (e) {
                    content.textContent = 'Could not load credits. ' + (e && e.message ? e.message : '');
                }
            }

            function closeCredits() {
                overlay.hidden = true;
            }

            if (btn) btn.addEventListener('click', openCredits);
            if (closeBtn) closeBtn.addEventListener('click', closeCredits);
            overlay.addEventListener('click', (e) => { if (e.target === overlay) closeCredits(); });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !overlay.hidden) closeCredits(); });
        })();
    </script>
</body>
</html>
